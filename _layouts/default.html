<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.description | default: 'Shuai Zhang – Senior Staff AI Engineer & Manager at Qualcomm AI Research' }}">
  <meta name="keywords" content="machine learning, edge AI, computer vision, neural networks, Qualcomm, agentic AI">
  <title>{{ page.title | default: 'Shuai Zhang · Qualcomm AI Research' }}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    html { font-size: 16px; }
    @media (min-width: 768px)  { html { font-size: 18px; } }
    @media (min-width: 1024px) { html { font-size: 19px; } }
    @media (min-width: 1280px) { html { font-size: 20px; } }

    /* ── Qualcomm design tokens ── */
    :root {
      --qc-red:    #e2001a;
      --qc-red-dk: #b80015;
      --qc-purple: #7c3aed;
      --qc-grad:   linear-gradient(135deg, #e2001a 0%, #7c3aed 100%);
      --bg:        #09090f;
      --bg-card:   rgba(255,255,255,0.03);
      --border:    rgba(255,255,255,0.07);
      --border-hover: rgba(226,0,26,0.35);
      --text-1:    #f4f4f5;
      --text-2:    #a1a1aa;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scroll progress bar ── */
    #scroll-bar {
      position: fixed; top: 0; left: 0; z-index: 100;
      height: 2px; width: 0%;
      background: var(--qc-grad);
      transition: width 0.1s linear;
    }

    /* ── Dot grid ── */
    .dot-grid {
      background-image: radial-gradient(rgba(226,0,26,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* ── Hero glow ── */
    .hero-glow {
      background:
        radial-gradient(ellipse 70% 55% at 25% 30%, rgba(226,0,26,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 75% 70%, rgba(124,58,237,0.1) 0%, transparent 55%),
        var(--bg);
    }

    /* ── Gradient text utility ── */
    .grad-text {
      background: var(--qc-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Nav ── */
    .glass-nav {
      position: relative;
      background: rgba(9,9,15,0.93);
      backdrop-filter: blur(20px) saturate(180%);
    }
    .glass-nav::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(226,0,26,0.4) 30%, rgba(124,58,237,0.4) 70%, transparent 100%);
    }

    .nav-link {
      position: relative;
      font-size: 0.875rem; font-weight: 500;
      letter-spacing: 0.03em;
      color: #a1a1aa;
      transition: color 0.15s;
      padding-bottom: 2px;
    }
    .nav-link::after {
      content: '';
      position: absolute; bottom: -2px; left: 0; right: 0;
      height: 1.5px;
      background: var(--qc-grad);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.2s ease;
    }
    .nav-link:hover { color: #ffffff; }
    .nav-link:hover::after { transform: scaleX(1); }
    .nav-link.active { color: #f87171; }
    .nav-link.active::after { transform: scaleX(1); }

    /* ── Cards ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 24px rgba(226,0,26,0.08), 0 8px 32px rgba(0,0,0,0.5);
      transform: translateY(-2px);
    }

    /* ── Section label ── */
    .section-label {
      display: flex; align-items: center; gap: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 1.75rem;
    }
    .section-label .accent-bar {
      width: 3px; height: 1rem; border-radius: 2px;
      background: var(--qc-grad); flex-shrink: 0;
    }
    .section-label .line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, rgba(226,0,26,0.2), transparent);
    }

    /* ── Venue badges ── */
    .vtag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; font-weight: 500;
      padding: 2px 8px; border-radius: 3px;
      white-space: nowrap;
      background: rgba(226,0,26,0.08);
      color: #f87171;
      border: 1px solid rgba(226,0,26,0.22);
    }
    .vtag.green {
      background: rgba(34,197,94,0.07);
      color: #4ade80;
      border-color: rgba(34,197,94,0.2);
    }
    .vtag.amber {
      background: rgba(245,158,11,0.08);
      color: #fbbf24;
      border-color: rgba(245,158,11,0.22);
    }

    /* ── Stat boxes ── */
    .stat-box {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 0.875rem 1.25rem;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .stat-box:hover {
      border-color: rgba(226,0,26,0.3);
      box-shadow: 0 0 16px rgba(226,0,26,0.06);
    }
    .stat-box .num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.625rem; font-weight: 700;
      background: var(--qc-grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1;
    }
    .stat-box .lbl {
      font-size: 0.72rem; color: var(--text-2);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-top: 4px; font-weight: 500;
    }

    /* ── Buttons ── */
    .btn-blue {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      background: var(--qc-red);
      color: #fff; border-radius: 5px;
      font-weight: 600; font-size: 0.875rem;
      letter-spacing: 0.01em;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .btn-blue:hover {
      background: var(--qc-red-dk);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(226,0,26,0.45);
    }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      background: transparent;
      color: #a1a1aa;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 5px;
      font-weight: 500; font-size: 0.875rem;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .btn-ghost:hover {
      border-color: rgba(226,0,26,0.5);
      color: #f87171;
      background: rgba(226,0,26,0.05);
    }

    /* ── Timeline ── */
    .tl-track { border-left: 1px solid rgba(226,0,26,0.2); }
    .tl-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--qc-red); flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(226,0,26,0.15);
    }
    .tl-dot.muted {
      background: #3f3f46;
      box-shadow: 0 0 0 3px rgba(63,63,70,0.35);
    }

    /* ── Fade animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease-out both; }
    .d1 { animation-delay: 0.08s; }
    .d2 { animation-delay: 0.16s; }
    .d3 { animation-delay: 0.24s; }
    .d4 { animation-delay: 0.32s; }

    /* ── Back to top ── */
    #back-to-top {
      background: rgba(20,20,28,0.95);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      color: #a1a1aa;
      transition: color 0.15s, transform 0.2s, border-color 0.15s;
    }
    #back-to-top:hover {
      transform: translateY(-2px);
      color: #f87171;
      border-color: rgba(226,0,26,0.4);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(226,0,26,0.35); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--qc-red); }

    /* ── Selection ── */
    ::selection { background: rgba(226,0,26,0.22); color: #fff; }
  </style>
</head>

<body>
  <!-- Scroll progress -->
  <div id="scroll-bar"></div>

  <!-- ── Navigation ── -->
  <header class="glass-nav fixed top-0 left-0 right-0 z-50">
    <nav class="max-w-6xl mx-auto px-6 h-14 flex justify-between items-center">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-2 group shrink-0">
        <span class="font-mono text-red-500 text-sm opacity-80 group-hover:opacity-100 transition-opacity select-none">&gt;_</span>
        <span class="font-semibold text-white text-sm tracking-tight">Shuai Zhang</span>
      </a>

      <!-- Desktop links -->
      <div class="hidden md:flex items-center gap-8">
        <a href="/"        class="nav-link">Home</a>
        <a href="/about"   class="nav-link">About</a>
        <a href="/research"class="nav-link">Research</a>
        <a href="/webreport" class="nav-link">Media</a>
        <a href="https://github.com/zsivine/zsivine.github.io/raw/master/CV/Research_CV.pdf"
           target="_blank" rel="noopener noreferrer" class="btn-ghost text-xs py-1.5 px-3">
          <i class="fas fa-file-alt text-xs"></i> CV
        </a>
      </div>

      <!-- Mobile hamburger -->
      <button id="menu-toggle" class="md:hidden p-2 text-slate-500 hover:text-slate-200 transition-colors" aria-label="Toggle menu">
        <i class="fas fa-bars text-sm"></i>
      </button>
    </nav>

    <!-- Mobile dropdown -->
    <div id="mobile-menu" class="hidden md:hidden border-t border-slate-800/60 px-6 py-3 space-y-1">
      <a href="/"         class="block py-2 text-sm text-slate-400 hover:text-slate-100 transition-colors">Home</a>
      <a href="/about"    class="block py-2 text-sm text-slate-400 hover:text-slate-100 transition-colors">About</a>
      <a href="/research" class="block py-2 text-sm text-slate-400 hover:text-slate-100 transition-colors">Research</a>
      <a href="/webreport"class="block py-2 text-sm text-slate-400 hover:text-slate-100 transition-colors">Media</a>
      <a href="https://github.com/zsivine/zsivine.github.io/raw/master/CV/Research_CV.pdf"
         target="_blank" class="block py-2 text-sm text-blue-400 hover:text-blue-300 transition-colors">Download CV</a>
    </div>
  </header>

  <!-- ── Main content ── -->
  <main class="pt-14">
    {{ content }}
  </main>

  <!-- ── Footer ── -->
  <footer class="border-t border-slate-800/60 mt-24">
    <div class="max-w-6xl mx-auto px-6 py-10">
      <div class="flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
          <p class="font-mono text-xs text-slate-400 mb-1">Shuai Zhang · Qualcomm AI Research</p>
          <p class="text-xs text-slate-500">San Diego, CA · © {{ 'now' | date: '%Y' }}</p>
        </div>
        <div class="flex items-center gap-6">
          <a href="https://scholar.google.com/citations?user=QxEgRpUAAAAJ&hl=en"
             target="_blank" rel="noopener noreferrer" title="Google Scholar"
             class="text-slate-600 hover:text-red-400 transition-colors text-lg">
            <i class="fas fa-graduation-cap"></i>
          </a>
          <a href="https://www.linkedin.com/in/shuai-zhang-20727645/"
             target="_blank" rel="noopener noreferrer" title="LinkedIn"
             class="text-slate-600 hover:text-red-400 transition-colors text-lg">
            <i class="fab fa-linkedin"></i>
          </a>
          <a href="https://github.com/zsivine"
             target="_blank" rel="noopener noreferrer" title="GitHub"
             class="text-slate-600 hover:text-red-400 transition-colors text-lg">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://lpcv.ai/"
             target="_blank" rel="noopener noreferrer" title="LPCVC"
             class="text-slate-600 hover:text-red-400 transition-colors text-lg">
            <i class="fas fa-trophy"></i>
          </a>
        </div>
        <p class="text-xs text-slate-500 text-center md:text-right max-w-xs">
          Views expressed are solely the author's and do not represent Qualcomm.
        </p>
      </div>
    </div>
  </footer>

  <!-- Back to top -->
  <button id="back-to-top" class="fixed bottom-6 right-6 w-9 h-9 flex items-center justify-center text-slate-400 rounded-full hidden shadow-xl" aria-label="Back to top">
    <i class="fas fa-arrow-up text-xs"></i>
  </button>

  <script>
    // Mobile menu
    const toggle = document.getElementById('menu-toggle');
    const menu   = document.getElementById('mobile-menu');
    if (toggle) toggle.addEventListener('click', () => menu.classList.toggle('hidden'));

    // Active nav highlight
    document.querySelectorAll('.nav-link').forEach(link => {
      const href = link.getAttribute('href');
      const path = window.location.pathname.replace(/\/$/, '') || '/';
      const h    = href.replace(/\/$/, '') || '/';
      if (h === path || (h !== '/' && path.startsWith(h))) link.classList.add('active');
    });

    // Scroll progress bar
    const bar = document.getElementById('scroll-bar');
    function updateBar() {
      const d = document.documentElement;
      const pct = (d.scrollTop / (d.scrollHeight - d.clientHeight)) * 100;
      bar.style.width = pct + '%';
    }
    window.addEventListener('scroll', updateBar, { passive: true });

    // Back to top
    const btt = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => btt.classList.toggle('hidden', window.scrollY < 400), { passive: true });
    btt.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
</body>
</html>
